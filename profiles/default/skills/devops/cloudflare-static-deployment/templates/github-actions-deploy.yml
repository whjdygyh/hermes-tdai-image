# GitHub Actions workflow: auto-deploy to Cloudflare Pages on push to main
# Place this at .github/workflows/deploy.yml in your repo root.
#
# Prerequisites:
# 1. A Cloudflare API Token with Workers+Pages Edit permissions
# 2. The token saved as a GitHub secret named CLOUDFLARE_API_TOKEN
# 3. Node.js >= v22 available in the runner (Ubuntu-latest has it)
#
# After setup: every `git push origin main` triggers automatic redeploy.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Optional: manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler pages deploy . \
            --project-name alexander-album \
            --branch main
